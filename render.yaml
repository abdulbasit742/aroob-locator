services:
  - type: web
    name: aroob-locator
    runtime: python
    plan: free
    buildCommand: pip install --requirement requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FORCE_HTTPS
        value: "1"
