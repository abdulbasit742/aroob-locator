name: Verify privacy boundary

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: aroob-locator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: python -m pip install --requirement requirements-dev.txt
      - run: pytest
      - run: python -m compileall -q app.py locator scripts tests
      - run: node --check web/assets/index.js
      - run: node --check web/assets/share.js
      - run: node --check web/assets/viewer.js
      - run: python scripts/security_check.py
