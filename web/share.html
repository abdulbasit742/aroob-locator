<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Explicitly accept a short-lived location sharing invitation."><title>Share location — Aroob Locator</title><link rel="stylesheet" href="/assets/styles.css"><script type="module" src="/assets/share.js"></script></head>
<body><a class="skip" href="#main">Skip to main content</a><main id="main" class="shell"><section class="card"><p class="eyebrow">You control this share</p><h1>Share your location</h1><p>This page requests browser geolocation only after you accept. Sharing stops when you press stop, close or hide this page, or the invitation expires.</p><div class="field"><label for="precision">Precision</label><select id="precision"><option value="approximate" selected>Approximate (about 110 m)</option><option value="exact">Exact coordinates</option></select></div><label class="check"><input id="consent" type="checkbox"><span>I understand who sent this link and I choose to share my latest location for the stated time.</span></label><div class="actions"><button id="start" class="primary" type="button">Accept and start</button><button id="stop" class="danger" type="button" disabled>Stop and erase</button></div><div id="status" class="status" role="status" aria-live="polite">Invitation loaded locally. No location requested yet.</div><div id="last" class="coordinate hint"></div></section></main></body></html>
